id: ng.levitati.Starmap
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: starmap
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --env=RUST_BACKTRACE=1
modules:
  - name: starmap
    buildsystem: simple
    build-commands:
      - install -Dm755 starmap /app/bin/starmap
      - install -Dm644 ng.levitati.Starmap.desktop /app/share/applications/ng.levitati.Starmap.desktop
      - install -Dm644 ng.levitati.Starmap.svg /app/share/icons/hicolor/scalable/apps/ng.levitati.Starmap.svg
    sources:
      - type: file
        path: target/release/starmap
      - type: file
        path: ng.levitati.Starmap.desktop
      - type: file
        path: ng.levitati.Starmap.svg
